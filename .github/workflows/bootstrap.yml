name: Bootstrap S3 State Bucket

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Create S3 state bucket
    runs-on: self-hosted
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Confirm Terraform version
        run: terraform version

      - name: Terraform init (local state)
        working-directory: bootstrap
        run: terraform init

      - name: Terraform validate
        working-directory: bootstrap
        run: terraform validate

      - name: Terraform plan
        working-directory: bootstrap
        run: terraform plan -no-color

      - name: Terraform apply
        working-directory: bootstrap
        run: terraform apply -auto-approve -no-color

      - name: Print bucket name
        working-directory: bootstrap
        run: |
          echo "================================================"
          echo "S3 STATE BUCKET CREATED SUCCESSFULLY"
          echo "Bucket name:"
          terraform output state_bucket_name
          echo "================================================"