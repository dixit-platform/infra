name: CI - Terraform Validation

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - dev
      - stage
      - main

permissions:
  contents: read

jobs:
  resolve-context:
    name: Resolve Environment
    runs-on: [self-hosted, Linux, X64, terraform]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tf_dir: ${{ steps.resolve.outputs.tf_dir }}

    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF="${{ github.base_ref }}"
          else
            REF="${{ github.ref_name }}"
          fi

          if [[ "$REF" == "dev" ]]; then
            ENVIRONMENT="dev"
            TF_DIR="terraform/environments/dev"
          elif [[ "$REF" == "stage" ]]; then
            ENVIRONMENT="stage"
            TF_DIR="terraform/environments/stage"
          elif [[ "$REF" == "main" ]]; then
            ENVIRONMENT="prod"
            TF_DIR="terraform/environments/prod"
          else
            ENVIRONMENT="dev"
            TF_DIR="terraform/environments/dev"
          fi

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "tf_dir=$TF_DIR" >> "$GITHUB_OUTPUT"

          echo "Event       : ${{ github.event_name }}"
          echo "Ref         : $REF"
          echo "Environment : $ENVIRONMENT"
          echo "TF Dir      : $TF_DIR"

  lint:
    name: Lint & Validate
    runs-on: [self-hosted, Linux, X64, terraform]
    needs: resolve-context
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform

      - name: Terraform Validate
        working-directory: ${{ needs.resolve-context.outputs.tf_dir }}
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: TFLint
        working-directory: ${{ needs.resolve-context.outputs.tf_dir }}
        run: tflint

  security:
    name: Security Scan
    runs-on: [self-hosted, Linux, X64, terraform]
    needs: lint
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Gitleaks Scan
        run: gitleaks detect --source . --exit-code 1

      - name: Trivy Scan
        run: trivy config . --severity HIGH,CRITICAL

      - name: Checkov Scan
        run: |
          checkov -d . \
            --framework terraform \
            --quiet \
            --soft-fail-on MEDIUM,LOW \
            --hard-fail-on HIGH,CRITICAL \
            --skip-check CKV_AWS_18,CKV_AWS_21,CKV_AWS_144,CKV_AWS_145,CKV2_AWS_61,CKV2_AWS_62,CKV2_AWS_64,CKV_AWS_7,CKV_AWS_158,CKV_AWS_338,CKV_AWS_290,CKV_AWS_355

  plan:
    name: Terraform Plan
    runs-on: [self-hosted, Linux, X64, terraform]
    needs: [resolve-context, security]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Terraform Init
        working-directory: ${{ needs.resolve-context.outputs.tf_dir }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ needs.resolve-context.outputs.tf_dir }}
        run: terraform plan -no-color -input=false