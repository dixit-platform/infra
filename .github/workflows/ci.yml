name: CI - Terraform Validation

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:

  lint:
    name: Lint & Validate
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: TFLint
        working-directory: terraform/environments/dev
        run: tflint

  security:
    name: Security Scan
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks Scan
        run: gitleaks detect --source . --exit-code 1

      - name: Trivy Scan
        run: trivy config . --severity HIGH,CRITICAL

      - name: Checkov Scan
        run: checkov -d . --framework terraform --quiet

  plan:
    name: Terraform Plan
    runs-on: self-hosted
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -no-color