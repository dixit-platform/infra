name: CD Pipeline

# ─────────────────────────────────────────────────────────────
# ROLE IN THE PIPELINE:
#   This workflow ONLY does two things:
#   1. Ephemeral apply+destroy — proves the code actually works
#   2. Creates a release tag — the deployable artifact
#
#   It does NOT do persistent deploys. That is done by:
#   - auto-deploy.yml  → triggered by dev-v* tag  → deploys dev
#   - deploy.yml       → manual trigger            → deploys stage/prod
#
# TAG CHAIN:
#   merge to dev   → ephemeral dev cycle   → creates dev-v*
#   merge to stage → ephemeral stage cycle → creates stage-v*
#   merge to main  → ephemeral prod cycle  → creates v*
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - dev
      - stage
      - main

permissions:
  contents: write   # needed to create and push release tags

jobs:
  # ──────────────────────────────────────────────
  # 1. Resolve environment from branch
  # ──────────────────────────────────────────────
  set-env:
    name: Set Environment
    runs-on: [self-hosted, Linux, X64, terraform]
    if: github.event.repository.full_name == github.repository
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tag_prefix:  ${{ steps.resolve.outputs.tag_prefix }}
      tf_dir:      ${{ steps.resolve.outputs.tf_dir }}

    steps:
      - name: Resolve environment from branch
        id: resolve
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ENVIRONMENT="prod"
            TAG_PREFIX="v"
            TF_DIR="terraform/environments/prod"
          elif [[ "${{ github.ref_name }}" == "stage" ]]; then
            ENVIRONMENT="stage"
            TAG_PREFIX="stage-v"
            TF_DIR="terraform/environments/stage"
          else
            ENVIRONMENT="dev"
            TAG_PREFIX="dev-v"
            TF_DIR="terraform/environments/dev"
          fi

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "tag_prefix=$TAG_PREFIX"   >> $GITHUB_OUTPUT
          echo "tf_dir=$TF_DIR"           >> $GITHUB_OUTPUT

          echo "========================================"
          echo "  CD CONTEXT"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Environment : $ENVIRONMENT"
          echo "  Tag Prefix  : $TAG_PREFIX"
          echo "  TF Dir      : $TF_DIR"
          echo "  Triggered by: ${{ github.actor }}"
          echo "========================================"

  # ──────────────────────────────────────────────
  # 2. Ephemeral cycle: init → plan → apply → validate → destroy
  #
  #    No approval gate here — this is validation only.
  #    Approval gates live in deploy.yml for persistent deploys.
  #    destroy runs with if: always() so infra is never left up
  #    even if validate fails.
  # ──────────────────────────────────────────────
  ephemeral-deploy:
    name: Ephemeral Deploy (${{ needs.set-env.outputs.environment }})
    needs: set-env
    runs-on: [self-hosted, Linux, X64, terraform]
    env:
      TF_DIR: ${{ needs.set-env.outputs.tf_dir }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Terraform
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # Fresh plan — never reuse CI plan artifact.
      # CD runs post-merge so no CI artifact exists at this point.
      # Fresh plan also guarantees we see current state.
      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -out=tfplan
          echo "Plan complete"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "========================================"
          echo "  EPHEMERAL APPLY — ${{ needs.set-env.outputs.environment }}"
          echo "========================================"
          terraform apply -input=false -auto-approve tfplan

      - name: Validate Infrastructure
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "========================================"
          echo "  INFRASTRUCTURE VALIDATION"
          echo "========================================"
          OUTPUT=$(terraform output 2>&1)
          if echo "$OUTPUT" | grep -q "No outputs found"; then
            echo "No outputs defined yet — skipping output check"
          else
            echo "$OUTPUT"
          fi
          echo "Validation complete"

      # Always destroy — ephemeral by design, zero long-term cost
      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        if: always()
        run: |
          echo "========================================"
          echo "  DESTROYING EPHEMERAL INFRASTRUCTURE"
          echo "========================================"
          terraform destroy -input=false -auto-approve

  # ──────────────────────────────────────────────
  # 3. Create release tag after successful ephemeral cycle
  #
  #    Tag is the deployable artifact — nothing deploys without one.
  #    dev-v*   → picked up automatically by auto-deploy.yml
  #    stage-v* → picked up manually via deploy.yml
  #    v*       → picked up manually via deploy.yml
  # ──────────────────────────────────────────────
  tag-release:
    name: Tag Release
    needs: [set-env, ephemeral-deploy]
    runs-on: [self-hosted, Linux, X64, terraform]
    if: success() && github.event.repository.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # needed to read all existing tags

      - name: Generate next version tag
        id: version
        run: |
          PREFIX="${{ needs.set-env.outputs.tag_prefix }}"

          LATEST=$(git tag --list "${PREFIX}*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            NEXT="${PREFIX}1.0.0"
          else
            VERSION="${LATEST#$PREFIX}"
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEXT="${PREFIX}${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next tag: $NEXT"

      - name: Create and push release tag
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
          echo "========================================"
          echo "  RELEASE TAG CREATED"
          echo "  Tag         : ${{ steps.version.outputs.tag }}"
          echo "  Environment : ${{ needs.set-env.outputs.environment }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "========================================"