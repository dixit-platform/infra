name: CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

permissions:
  contents: write  # needed to create release tags
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Determine which environment to target
  # ──────────────────────────────────────────────
  set-env:
    name: Set Environment
    runs-on: [self-hosted, Linux, X64, terraform]
    if: github.event.repository.full_name == github.repository
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tag_prefix:  ${{ steps.resolve.outputs.tag_prefix }}
      tf_dir:      ${{ steps.resolve.outputs.tf_dir }}
    steps:
      - name: Resolve environment from branch
        id: resolve
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod"    >> $GITHUB_OUTPUT
            echo "tag_prefix=v"       >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/environments/prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging"        >> $GITHUB_OUTPUT
            echo "tag_prefix=staging-v"      >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/environments/staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev"        >> $GITHUB_OUTPUT
            echo "tag_prefix=dev-v"      >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/environments/dev" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # 2. Ephemeral deploy: apply → validate → destroy
  # ──────────────────────────────────────────────
  deploy:
    name: Ephemeral Deploy (${{ needs.set-env.outputs.environment }})
    needs: set-env
    runs-on: [self-hosted, Linux, X64, terraform]
    environment: ${{ needs.set-env.outputs.environment }}   # triggers approval gate for staging/prod
    env:
      TF_DIR: ${{ needs.set-env.outputs.tf_dir }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Terraform
        run: terraform version

      # ── Init ──────────────────────────────────
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false

      # ── Download plan artifact from CI ────────
      # The CI pipeline uploads tfplan as an artifact.
      # We download and apply EXACTLY that plan — no surprises.
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.set-env.outputs.environment }}
          path: ${{ env.TF_DIR }}
        continue-on-error: true   # first run may not have a CI artifact yet

      # ── Apply ─────────────────────────────────
      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -f tfplan ]; then
            echo "Applying saved plan artifact..."
            terraform apply -input=false -auto-approve tfplan
          else
            echo "No plan artifact found — running fresh apply..."
            terraform apply -input=false -auto-approve
          fi

      # ── Validate infra (smoke test) ───────────
      - name: Validate Infrastructure
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "========================================"
          echo "  INFRASTRUCTURE VALIDATION"
          echo "========================================"
          terraform output
          echo "All outputs retrieved successfully ✅"

      # ── Destroy (ephemeral — zero long-term cost) ──
      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        if: always()   # destroy even if validate step fails
        run: |
          echo "========================================"
          echo "  DESTROYING EPHEMERAL INFRASTRUCTURE"
          echo "========================================"
          terraform destroy -input=false -auto-approve

  # ──────────────────────────────────────────────
  # 3. Create release tag after successful deploy+destroy
  # ──────────────────────────────────────────────
  tag-release:
    name: Tag Release
    needs: [set-env, deploy]
    runs-on: [self-hosted, Linux, X64, terraform]
    if: success() && github.event.repository.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read existing tags

      - name: Generate next version tag
        id: version
        run: |
          PREFIX="${{ needs.set-env.outputs.tag_prefix }}"

          # Find the latest tag matching this prefix and bump patch version
          LATEST=$(git tag --list "${PREFIX}*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            NEXT="${PREFIX}1.0.0"
          else
            # Strip prefix, split semver
            VERSION="${LATEST#$PREFIX}"
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEXT="${PREFIX}${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next tag: $NEXT"

      - name: Create and push release tag
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
          echo "========================================"
          echo "  RELEASE TAG CREATED"
          echo "  ${{ steps.version.outputs.tag }}"
          echo "========================================"

      - name: Print release summary
        run: |
          echo "  CD Pipeline complete"
          echo "  Environment : ${{ needs.set-env.outputs.environment }}"
          echo "  Release tag : ${{ steps.version.outputs.tag }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Triggered by: ${{ github.actor }}"